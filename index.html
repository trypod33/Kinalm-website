  <style>
    :root {
      --bg: #f4f8fc;
      --surface: #ffffff;
      --text: #182536;
      --muted: #63748a;
      --primary: #0c61ad;
      --primary-hover: #094c87;
      --border: rgba(15, 36, 59, 0.1);
      --shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
      --radius: 24px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: 'Inter', Arial, sans-serif;
      background: radial-gradient(circle at top, rgba(12,97,173,.16), transparent 30%), var(--bg);

    }
    main {
      width: min(100%, 560px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 48px 32px;
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.5rem, 6vw, 4rem);
      letter-spacing: -0.04em;
    }
    p {
      margin: 0 auto 28px;
      max-width: 32ch;
      font-size: 1rem;
      line-height: 1.6;
      color: var(--muted);
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0 24px;
      border-radius: 999px;
      background: var(--primary);
      color: #fff;
      text-decoration: none;
      font-weight: 800;
      transition: background 180ms ease, transform 180ms ease;
    }
    a:hover { background: var(--primary-hover); transform: translateY(-1px); }
